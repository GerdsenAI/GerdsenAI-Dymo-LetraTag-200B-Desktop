name: build

# Produces installers for both desktop targets. PyInstaller can't cross-compile,
# so each OS freezes its own sidecar and bundles the Tauri app natively.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis
          - os: macos-latest
            bundles: app,dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "bleak~=1.1.1" "pillow~=11.0.0" "python-barcode[images]~=0.15.1" pyinstaller

      - name: Freeze Python sidecar
        run: python scripts/build_sidecar.py

      - name: Install frontend deps
        run: npm ci

      - name: Build app
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: label-studio-${{ matrix.os }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

      # On a v* tag, attach each OS's bundles to the matching GitHub release, so the
      # macOS .dmg lands alongside the Windows assets automatically. Null-delimited to
      # survive the space in "Label Studio_<ver>_x64-setup.exe".
      - name: Attach bundles to the release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find src-tauri/target/release/bundle -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.msi' \) -print0 |
            while IFS= read -r -d '' f; do
              echo "Uploading: $f"
              gh release upload "$GITHUB_REF_NAME" "$f" --clobber
            done
