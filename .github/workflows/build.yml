name: build

# Produces installers for both desktop targets. PyInstaller can't cross-compile,
# so each OS freezes its own sidecar and bundles the Tauri app natively.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis
          - os: macos-latest
            bundles: app,dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "bleak~=1.1.1" "pillow~=11.0.0" "python-barcode[images]~=0.15.1" pyinstaller

      - name: Freeze Python sidecar
        run: python scripts/build_sidecar.py

      - name: Install frontend deps
        run: npm ci

      - name: Build app
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: label-studio-${{ matrix.os }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
